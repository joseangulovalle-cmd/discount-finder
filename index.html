<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; }
    header { background: #2b6cb0; color: white; padding: 24px 32px; }
    header h1 { font-size: 28px; font-weight: 700; }
    header p { font-size: 14px; opacity: 0.8; margin-top: 4px; }
    .no-deals { text-align: center; padding: 80px 32px; color: #a0aec0; font-size: 18px; }
    .no-deals span { display: block; font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Deal Finder</h1>
    <p>Automated discount tracker across Canadian online stores</p>
  </header>
  <div class="no-deals">
    <span>🔍</span>
    The bot hasn't run yet. Deals will appear here after the first scheduled run.
  </div>
</body>
</html>
